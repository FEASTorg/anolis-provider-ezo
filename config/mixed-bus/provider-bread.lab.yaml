provider:
  name: bread0

hardware:
  bus_path: /dev/i2c-1
  query_delay_us: 10000
  timeout_ms: 100
  retry_count: 2

discovery:
  mode: manual
  addresses: [0x0A, 0x14, 0x15]

devices:
  - id: rlht0
    type: rlht
    label: Reactor Left Heater
    address: 0x0A
  - id: dcmt0
    type: dcmt
    label: Conveyor Drive 0
    address: 0x14
  - id: dcmt1
    type: dcmt
    label: Conveyor Drive 1
    address: 0x15
